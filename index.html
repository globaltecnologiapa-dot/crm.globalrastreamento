<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Global Rastreamento PRO</title>

<style>
body{font-family:Arial;background:#0f172a;color:#fff;margin:0;padding:10px}
h1{text-align:center;font-size:18px}
.status{background:#1e293b;padding:8px;border-radius:8px;text-align:center;margin-bottom:10px;font-size:12px}
.board{display:flex;gap:10px;overflow-x:auto}
.column{background:#1e293b;padding:10px;border-radius:12px;min-width:85vw}
.card{background:#334155;padding:8px;border-radius:8px;margin-bottom:8px;font-size:13px}
button{padding:6px;border:none;border-radius:6px;cursor:pointer;font-size:12px;width:100%;margin-top:5px}
.add-btn{background:#facc15;font-weight:bold}
.small-btn{background:#22c55e}
.delete-btn{background:#ef4444}
.msg-btn{background:#3b82f6}
textarea{width:100%;height:60px;border-radius:6px;border:none;padding:6px;margin-top:5px;font-size:12px}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#000000aa;display:none;justify-content:center;align-items:center}
.modal-content{background:#1e293b;padding:15px;border-radius:12px;width:90%;max-width:400px}
input{width:100%;padding:6px;border-radius:6px;border:none;margin-top:5px}
</style>
</head>
<body>

<h1>CRM Global Rastreamento PRO</h1>
<div class="status" id="status">🔄 Inicializando...</div>
<button class="msg-btn" onclick="abrirMensagens()">📩 Mensagens Pré-definidas</button>
<div class="board" id="board"></div>

<!-- MODAL MENSAGENS -->
<div class="modal" id="modalMsg">
<div class="modal-content">
<h3>Mensagens Salvas</h3>
<div id="listaMensagens"></div>
<input type="text" id="novaMensagem" placeholder="Digite nova mensagem ou link">
<button onclick="salvarMensagem()">Salvar</button>
<button onclick="fecharMensagens()">Fechar</button>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, updateDoc, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
apiKey: "SUA_API",
authDomain: "SEU_AUTH",
projectId: "SEU_PROJECT",
storageBucket: "SEU_BUCKET",
messagingSenderId: "SEU_ID",
appId: "SEU_APP"
};

const etapas=[
"Cliente Qualificado",
"Confirmação de Intenção",
"Coleta de Dados",
"Envio do Contrato",
"Pagamento Antes de Agendar",
"Confirmação Financeira",
"Agendamento"
];

let db=null;
let online=false;
let clientes=[];

function salvarLocal(){
localStorage.setItem("crm_clientes",JSON.stringify(clientes));
}

function carregarLocal(){
clientes=JSON.parse(localStorage.getItem("crm_clientes")||"[]");
}

function salvarMensagensLocal(lista){
localStorage.setItem("crm_mensagens",JSON.stringify(lista));
}

function carregarMensagensLocal(){
return JSON.parse(localStorage.getItem("crm_mensagens")||"[]");
}

async function iniciar(){
carregarLocal();
criarBoard();

try{
const app=initializeApp(firebaseConfig);
db=getFirestore(app);
online=true;
document.getElementById("status").innerText="✅ Online com Backup Ativo";
await sincronizar();
}catch{
document.getElementById("status").innerText="⚠️ Modo Offline com Backup";
}
}

async function sincronizar(){
if(!online) return;
try{
const snapshot=await getDocs(collection(db,"clientes"));
clientes=[];
snapshot.forEach(docSnap=>{
let c=docSnap.data();
c.id=docSnap.id;
clientes.push(c);
});
salvarLocal();
criarBoard();
}catch{}
}

function criarBoard(){
const board=document.getElementById("board");
board.innerHTML="";
etapas.forEach(etapa=>{
let col=document.createElement("div");
col.className="column";
col.innerHTML=`<h3>${etapa}</h3>
<button class='add-btn' onclick="adicionarCliente('${etapa}')">Adicionar</button>`;
clientes.filter(c=>c.etapa===etapa).forEach(cliente=>{
col.innerHTML+=`
<div class="card">
<strong>${cliente.nome}</strong>

<textarea onchange="editarMensagem('${cliente.id}',this.value)">
${cliente.mensagem||""}
</textarea>

<button onclick="copiarWhats('${cliente.id}')" style="background:#25d366">
📲 Copiar p/ WhatsApp
</button>

<button class='small-btn' onclick="mover('${cliente.id}','${etapa}')">
Avançar
</button>

<button class='delete-btn' onclick="remover('${cliente.id}')">
Excluir
</button>
</div>`;
});
board.appendChild(col);
});
}

window.adicionarCliente=function(etapa){
let nome=prompt("Nome do cliente:");
if(!nome) return;
let novo={id:Date.now().toString(),nome,etapa,mensagem:""};
clientes.push(novo);
salvarLocal();
criarBoard();
}

window.mover=function(id,etapa){
let pos=etapas.indexOf(etapa);
if(pos<etapas.length-1){
clientes.find(c=>c.id===id).etapa=etapas[pos+1];
salvarLocal();
criarBoard();
}
}

window.remover=function(id){
clientes=clientes.filter(c=>c.id!==id);
salvarLocal();
criarBoard();
}

window.editarMensagem=function(id,texto){
clientes.find(c=>c.id===id).mensagem=texto;
salvarLocal();
}

// ===== SISTEMA DE MENSAGENS =====
window.abrirMensagens=function(){
document.getElementById("modalMsg").style.display="flex";
renderMensagens();
}

window.fecharMensagens=function(){
document.getElementById("modalMsg").style.display="none";
}

function renderMensagens(){
let lista=carregarMensagensLocal();
let div=document.getElementById("listaMensagens");
div.innerHTML="";
lista.forEach((m,i)=>{
div.innerHTML+=`
<div style="margin-bottom:5px">
<textarea onchange="editarMsg(${i},this.value)">${m}</textarea>
<button onclick="excluirMsg(${i})">Excluir</button>
</div>`;
});
}

window.salvarMensagem=function(){
let texto=document.getElementById("novaMensagem").value;
if(!texto) return;
let lista=carregarMensagensLocal();
lista.push(texto);
salvarMensagensLocal(lista);
document.getElementById("novaMensagem").value="";
renderMensagens();
}

window.editarMsg=function(i,texto){
let lista=carregarMensagensLocal();
lista[i]=texto;
salvarMensagensLocal(lista);
}

window.excluirMsg=function(i){
let lista=carregarMensagensLocal();
lista.splice(i,1);
salvarMensagensLocal(lista);
renderMensagens();
}
window.copiarWhats = function(id){

let cliente = clientes.find(c=>c.id===id);

if(!cliente) return;

let texto = `Olá ${cliente.nome} 👋

${cliente.mensagem}

Global Rastreamento 🚗📡`;

navigator.clipboard.writeText(texto).then(()=>{
alert("✅ Mensagem copiada para WhatsApp!");
}).catch(()=>{
alert("⚠️ Não foi possível copiar automaticamente.");
});

}
iniciar();
</script>
</body>
</html>
